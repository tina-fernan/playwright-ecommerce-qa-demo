<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FakeStore QA Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    /* ── Navbar ───────────────────────────────────────────── */
    .navbar {
      background: #2c3e50;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .navbar h1 { font-size: 1.2rem; }
    .navbar span { font-size: 0.9rem; opacity: 0.8; }

    /* ── Login Page ───────────────────────────────────────── */
    .login-container {
      max-width: 400px;
      margin: 80px auto;
      background: white;
      border-radius: 8px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
    }
    .login-container h2 {
      margin-bottom: 1.5rem;
      color: #2c3e50;
      text-align: center;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
      color: #555;
    }
    .form-group input {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    .form-group input:focus {
      outline: none;
      border-color: #3498db;
    }
    .btn {
      width: 100%;
      padding: 0.8rem;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }
    .btn:hover { background: #34495e; }
    .btn:disabled { background: #aaa; cursor: not-allowed; }

    .error-message {
      background: #fdecea;
      color: #c0392b;
      padding: 0.7rem 1rem;
      border-radius: 6px;
      margin-top: 1rem;
      font-size: 0.9rem;
      display: none;
    }
    .error-message.visible { display: block; }

    /* ── Products Page ────────────────────────────────────── */
    .products-page { display: none; }
    .products-page.visible { display: block; }

    .products-header {
      background: white;
      padding: 1rem 2rem;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .products-header h2 { color: #2c3e50; }
    .logout-btn {
      padding: 0.5rem 1rem;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .filters {
      padding: 1rem 2rem;
      background: white;
      border-bottom: 1px solid #eee;
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .filters label { font-size: 0.9rem; color: #555; }
    .filters select {
      padding: 0.4rem 0.8rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
    }

    .product-card {
      background: white;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .product-card img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      border-radius: 4px;
    }
    .product-card .product-title {
      font-size: 0.85rem;
      font-weight: 500;
      color: #2c3e50;
      line-height: 1.4;
    }
    .product-card .product-category {
      font-size: 0.75rem;
      color: #888;
      text-transform: capitalize;
    }
    .product-card .product-price {
      font-size: 1.1rem;
      font-weight: 600;
      color: #27ae60;
    }
    .add-to-cart {
      margin-top: auto;
      padding: 0.5rem;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: #888;
      font-size: 1rem;
    }

    .welcome-msg {
      font-size: 0.9rem;
      color: #888;
    }

    /* ── Cart Badge ───────────────────────────────────────── */
    .cart-count {
      background: #e74c3c;
      color: white;
      border-radius: 50%;
      padding: 2px 7px;
      font-size: 0.75rem;
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────────────── -->
  <div class="navbar">
    <h1>FakeStore</h1>
    <span id="nav-info">Please log in</span>
  </div>

  <!-- ── Login Form ──────────────────────────────────────────── -->
  <div class="login-container" id="login-page">
    <h2>Sign In</h2>
    <div class="form-group">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        placeholder="Enter your username"
        data-testid="username-input"
      />
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input
        type="password"
        id="password"
        placeholder="Enter your password"
        data-testid="password-input"
      />
    </div>
    <button class="btn" id="login-btn" data-testid="login-button">
      Sign In
    </button>
    <div class="error-message" id="error-msg" data-testid="error-message">
      Invalid username or password. Please try again.
    </div>
  </div>

  <!-- ── Products Page ───────────────────────────────────────── -->
  <div class="products-page" id="products-page">
    <div class="products-header">
      <h2>Products <span class="cart-count" id="cart-count">0</span></h2>
      <div style="display:flex;align-items:center;gap:1rem">
        <span class="welcome-msg" id="welcome-msg"></span>
        <button class="logout-btn" id="logout-btn" data-testid="logout-button">
          Logout
        </button>
      </div>
    </div>

    <div class="filters">
      <label for="category-filter">Filter by category:</label>
      <select id="category-filter" data-testid="category-filter">
        <option value="all">All Categories</option>
      </select>
    </div>

    <div id="products-container">
      <div class="loading" id="loading-msg">Loading products...</div>
      <div class="products-grid" id="products-grid"></div>
    </div>
  </div>

  <script>
    const API = 'https://fakestoreapi.com';
    let cartCount = 0;

    // ── Login ──────────────────────────────────────────────────
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const btn = document.getElementById('login-btn');
      const errorMsg = document.getElementById('error-msg');

      errorMsg.classList.remove('visible');
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        if (!res.ok) throw new Error('Login failed');

        const data = await res.json();
        localStorage.setItem('token', data.token);
        localStorage.setItem('username', username);

        showProductsPage(username);
      } catch {
        errorMsg.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });

    // ── Show Products Page ─────────────────────────────────────
    async function showProductsPage(username) {
      document.getElementById('login-page').style.display = 'none';
      document.getElementById('products-page').classList.add('visible');
      document.getElementById('welcome-msg').textContent = `Hello, ${username}`;
      document.getElementById('nav-info').textContent = username;

      await loadCategories();
      await loadProducts();
    }

    // ── Load Categories ────────────────────────────────────────
    async function loadCategories() {
      const res = await fetch(`${API}/products/categories`);
      const categories = await res.json();
      const select = document.getElementById('category-filter');

      categories.forEach(cat => {
        const option = document.createElement('option');
        option.value = cat;
        option.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
        select.appendChild(option);
      });

      select.addEventListener('change', async () => {
        const val = select.value;
        if (val === 'all') {
          await loadProducts();
        } else {
          await loadProducts(val);
        }
      });
    }

    // ── Load Products ──────────────────────────────────────────
    async function loadProducts(category = null) {
      const grid = document.getElementById('products-grid');
      const loading = document.getElementById('loading-msg');

      grid.innerHTML = '';
      loading.style.display = 'block';

      const url = category
        ? `${API}/products/category/${category}`
        : `${API}/products`;

      const res = await fetch(url);
      const products = await res.json();

      loading.style.display = 'none';

      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'product-card';
        card.setAttribute('data-testid', `product-card-${product.id}`);
        card.innerHTML = `
          <img src="${product.image}" alt="${product.title}" />
          <p class="product-category">${product.category}</p>
          <p class="product-title">${product.title}</p>
          <p class="product-price">$${product.price}</p>
          <button class="add-to-cart" data-testid="add-to-cart-${product.id}">
            Add to Cart
          </button>
        `;
        card.querySelector('.add-to-cart').addEventListener('click', () => {
          cartCount++;
          document.getElementById('cart-count').textContent = cartCount;
        });
        grid.appendChild(card);
      });
    }

    // ── Logout ─────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      localStorage.removeItem('username');
      document.getElementById('products-page').classList.remove('visible');
      document.getElementById('login-page').style.display = 'block';
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      document.getElementById('nav-info').textContent = 'Please log in';
      cartCount = 0;
      document.getElementById('cart-count').textContent = 0;
    });
  </script>

</body>
</html>
